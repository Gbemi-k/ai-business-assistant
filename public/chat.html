<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Business Chat</title>
  <style>
    :root {
      --ink: #1c241f;
      --muted: #657068;
      --line: rgba(28, 36, 31, 0.14);
      --panel: rgba(255, 255, 255, 0.9);
      --brand: #1f6b4e;
      --brand-dark: #164b38;
      --cream: #f6f1df;
      --customer: #e6f3ec;
      --assistant: #102117;
      --shadow: 0 22px 70px rgba(28, 36, 31, 0.16);
      font-family: "Aptos", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(215, 166, 66, 0.26), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(31, 107, 78, 0.22), transparent 34rem),
        repeating-linear-gradient(90deg, rgba(28, 36, 31, 0.03) 0 1px, transparent 1px 76px),
        var(--cream);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .shell {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
      min-height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      padding: 18px;
    }

    .hero,
    .details-card,
    .composer,
    .empty {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding: 20px;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.1rem, 7vw, 4.7rem);
      line-height: 0.9;
      margin: 0;
    }

    .hero p {
      color: var(--muted);
      margin: 10px 0 0;
      max-width: 560px;
    }

    .pill {
      align-self: start;
      background: #e8efe7;
      border-radius: 999px;
      color: var(--brand-dark);
      font-size: 0.82rem;
      font-weight: 800;
      padding: 8px 12px;
      white-space: nowrap;
    }

    .details-card {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .details-head {
      align-items: end;
      display: flex;
      gap: 12px;
      justify-content: space-between;
    }

    .details-head h2 {
      font-size: 1rem;
      margin: 0;
    }

    .details-head p {
      color: var(--muted);
      margin: 4px 0 0;
    }

    .details-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    label {
      color: var(--muted);
      display: grid;
      font-size: 0.78rem;
      font-weight: 800;
      gap: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .details-card small {
      color: var(--muted);
    }

    .messages {
      align-content: end;
      display: grid;
      gap: 12px;
      overflow-y: auto;
      padding: 4px;
    }

    .message {
      border-radius: 18px;
      line-height: 1.45;
      max-width: min(82%, 620px);
      padding: 13px 15px;
      white-space: pre-wrap;
    }

    .message.customer {
      justify-self: end;
      background: var(--customer);
      border: 1px solid rgba(31, 107, 78, 0.16);
    }

    .message.assistant {
      justify-self: start;
      background: var(--assistant);
      color: white;
    }

    .empty {
      align-self: center;
      color: var(--muted);
      padding: 20px;
      text-align: center;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
    }

    input,
    textarea {
      border: 1px solid var(--line);
      border-radius: 16px;
      outline: none;
      padding: 14px 15px;
      width: 100%;
    }

    textarea {
      min-height: 48px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(31, 107, 78, 0.12);
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quick-actions button {
      background: #e8efe7;
      color: var(--brand-dark);
      font-size: 0.9rem;
      padding: 9px 12px;
    }

    button {
      border: 0;
      border-radius: 16px;
      background: var(--brand);
      color: white;
      cursor: pointer;
      font-weight: 800;
      padding: 0 20px;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 640px) {
      .shell {
        padding: 10px;
      }

      .hero {
        border-radius: 20px;
        display: grid;
      }

      .details-grid {
        grid-template-columns: 1fr;
      }

      .message {
        max-width: 92%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <h1 id="businessName">Loading...</h1>
        <p id="businessDescription">Preparing this business assistant.</p>
      </div>
      <span class="pill" id="businessBadge">AI ordering</span>
    </section>

    <section class="details-card">
      <div class="details-head">
        <div>
          <h2>Your details</h2>
          <p>Saved on this device and sent with your order.</p>
        </div>
        <small>Name and phone are needed before checkout.</small>
      </div>
      <div class="details-grid">
        <label>Name
          <input id="customerName" autocomplete="name" placeholder="Your name">
        </label>
        <label>Phone / WhatsApp
          <input id="customerPhone" autocomplete="tel" placeholder="080...">
        </label>
      </div>
      <label>Delivery address or pickup note
        <textarea id="customerAddress" placeholder="Where should the business deliver, or will you pick up?"></textarea>
      </label>
      <label>Extra note
        <input id="customerNote" placeholder="Optional, e.g. delivery time or special request">
      </label>
      <div class="quick-actions">
        <button type="button" data-message="what do you have available?">What is available?</button>
        <button type="button" data-message="how much is it?">Ask price</button>
        <button type="button" data-message="show my last order">Last order</button>
      </div>
    </section>

    <section class="messages" id="messages">
      <div class="empty" id="emptyState">Say hello, ask what is available, or place an order.</div>
    </section>

    <form class="composer" id="chatForm">
      <input id="messageInput" autocomplete="off" placeholder="Type your message..." required>
      <button id="sendButton" type="submit">Send</button>
    </form>
  </main>

  <script>
    const businessId = decodeURIComponent(location.pathname.split("/").filter(Boolean).pop() || "");
    const sessionKey = `customerUserId:${businessId}`;
    const detailsKey = `customerDetails:${businessId}`;
    const state = {
      business: null,
      customerId: localStorage.getItem(sessionKey) || crypto.randomUUID(),
    };

    localStorage.setItem(sessionKey, state.customerId);

    const els = {
      businessName: document.querySelector("#businessName"),
      businessDescription: document.querySelector("#businessDescription"),
      businessBadge: document.querySelector("#businessBadge"),
      customerName: document.querySelector("#customerName"),
      customerPhone: document.querySelector("#customerPhone"),
      customerAddress: document.querySelector("#customerAddress"),
      customerNote: document.querySelector("#customerNote"),
      messages: document.querySelector("#messages"),
      emptyState: document.querySelector("#emptyState"),
      chatForm: document.querySelector("#chatForm"),
      messageInput: document.querySelector("#messageInput"),
      sendButton: document.querySelector("#sendButton"),
    };

    function loadCustomerDetails() {
      const saved = JSON.parse(localStorage.getItem(detailsKey) || "{}");
      els.customerName.value = saved.name || "";
      els.customerPhone.value = saved.phone || "";
      els.customerAddress.value = saved.address || "";
      els.customerNote.value = saved.note || "";
    }

    function customerDetails() {
      return {
        name: els.customerName.value.trim(),
        phone: els.customerPhone.value.trim(),
        address: els.customerAddress.value.trim(),
        note: els.customerNote.value.trim(),
      };
    }

    function saveCustomerDetails() {
      localStorage.setItem(detailsKey, JSON.stringify(customerDetails()));
    }

    function addMessage(role, text) {
      els.emptyState?.remove();
      const message = document.createElement("div");
      message.className = `message ${role}`;
      message.textContent = text;
      els.messages.appendChild(message);
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    async function loadBusiness() {
      const response = await fetch(`/public/businesses/${encodeURIComponent(businessId)}`);
      const body = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(body.error || "Business not found.");
      }

      state.business = body.business;
      document.title = `${state.business.name} Chat`;
      els.businessName.textContent = state.business.name;
      els.businessDescription.textContent = state.business.description || "Chat with us to ask questions or place an order.";
      els.businessBadge.textContent = state.business.contact_info || "AI ordering";
    }

    async function sendMessage(message) {
      saveCustomerDetails();

      const response = await fetch(`/public/chat/${encodeURIComponent(businessId)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          userId: state.customerId,
          customer: customerDetails(),
          message,
        }),
      });
      const body = await response.json().catch(() => ({}));

      if (!response.ok && !body.reply) {
        throw new Error(body.error || "Message failed.");
      }

      return body.reply || body.error || "Sorry, something went wrong.";
    }

    els.chatForm.addEventListener("submit", async event => {
      event.preventDefault();
      const message = els.messageInput.value.trim();
      if (!message) return;

      addMessage("customer", message);
      els.messageInput.value = "";
      els.sendButton.disabled = true;

      try {
        const reply = await sendMessage(message);
        addMessage("assistant", reply);
      } catch (error) {
        addMessage("assistant", error.message);
      } finally {
        els.sendButton.disabled = false;
        els.messageInput.focus();
      }
    });

    document.querySelectorAll("[data-message]").forEach(button => {
      button.addEventListener("click", () => {
        els.messageInput.value = button.dataset.message;
        els.chatForm.requestSubmit();
      });
    });

    [els.customerName, els.customerPhone, els.customerAddress, els.customerNote].forEach(input => {
      input.addEventListener("input", saveCustomerDetails);
    });

    loadCustomerDetails();
    loadBusiness().catch(error => {
      els.businessName.textContent = "Business not found";
      els.businessDescription.textContent = error.message;
      els.chatForm.classList.add("hidden");
    });
  </script>
</body>
</html>
